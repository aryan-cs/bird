<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting…</title>
  <style>
    body { background: #0d1117; color: #e6edf3; margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center; height: 100vh; line-height: 1.6; }
    .box { max-width: 540px; padding: 24px 28px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
    h1 { margin: 0 0 8px 0; font-size: 22px; font-weight: 600; }
    p { color: #8d96a0; font-size: 14px; margin: 6px 0; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: #0d1117; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="box" id="msg">
    <h1>404 · file not found</h1>
    <p id="detail"></p>
    <p>Go to the <a href="/bird/">STL viewer index</a> or visit the <a href="https://github.com/aryan-cs/bird" target="_blank" rel="noopener">repository on GitHub</a>.</p>
  </div>
  <script>
    (function () {
      // GitHub Pages serves this file on any 404 under aryan-cs.github.io/bird/...
      // If the URL points at a .stl file, redirect to the Three.js viewer with
      // that path as a query param. This makes URLs like
      //   /bird/jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_fuse_4.stl
      // open in the viewer automatically, mirroring how github.com renders STLs.
      const path = window.location.pathname;
      // Strip the leading /bird/ (the repo Pages base path). If you fork to
      // another user or repo name, this needs updating.
      // Catch both .stl and .json (multi-part assembly manifests).
      const m = path.match(/^\/bird\/(.+\.(?:stl|json))$/i);
      if (m) {
        const file = m[1];
        const dest = `/bird/viewer.html?stl=${encodeURIComponent(file)}`;
        // Use replace so back-button doesn't loop back to the 404.
        window.location.replace(dest);
        document.getElementById('detail').innerHTML =
          `Redirecting to viewer for <code>${file}</code>…`;
        return;
      }
      // Also handle .pdf — TimF's build PDF is at /bird/timf.pdf, but in case
      // someone tries a different name, point at the index.
      document.getElementById('detail').textContent =
        `The path "${path}" doesn't exist on this site.`;
    })();
  </script>
</body>
</html>
